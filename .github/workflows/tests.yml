name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: pip install -r plugins/media-distill/skills/media-distill/scripts/requirements.txt pytest

    - name: Run tests
      working-directory: plugins/media-distill/skills/media-distill/scripts
      run: python -m pytest tests/ -v
